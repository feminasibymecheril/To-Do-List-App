<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Taskora - Smart Task Manager</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="dashboard">

    <!-- SIDEBAR -->
    <aside class="sidebar">
        <h2 class="logo">Taskora</h2>

        <button id="openModalBtn" class="add-task-btn">+ Add Task</button>

        <div class="filters">
            <h4>Filters</h4>
            <button class="filter-btn active" data-filter="all">All</button>
            <button class="filter-btn" data-filter="completed">Completed</button>
            <button class="filter-btn" data-filter="pending">Pending</button>
        </div>

        <div class="theme-toggle">
            <label>
                <input type="checkbox" id="themeToggle">
                Dark Mode
            </label>
        </div>
    </aside>

    <!-- MAIN -->
    <main class="main-content">

        <header class="top-bar">
            <input type="text" id="searchInput" placeholder="Search tasks...">
            <div class="stats">
                <span id="taskCount">0 Tasks</span>
            </div>
        </header>

        <div class="progress-container">
            <div class="progress-bar" id="progressBar"></div>
        </div>

        <div id="taskList" class="task-list"></div>

        <div id="emptyState" class="empty-state">
            No tasks yet. Stay productive ✨
        </div>

    </main>

</div>

<!-- MODAL -->
<div id="taskModal" class="modal">
    <div class="modal-content">
        <h3>Add New Task</h3>

        <input type="text" id="taskTitle" placeholder="Task title">

        <textarea id="taskDescription" placeholder="Task description"></textarea>

        <select id="taskPriority">
            <option value="low">Low Priority</option>
            <option value="medium">Medium Priority</option>
            <option value="high">High Priority</option>
        </select>

        <input type="date" id="taskDueDate">

        <input type="text" id="taskCategory" placeholder="Category (e.g. Work)">

        <div class="modal-actions">
            <button id="saveTaskBtn">Save</button>
            <button id="closeModalBtn" class="cancel-btn">Cancel</button>
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
